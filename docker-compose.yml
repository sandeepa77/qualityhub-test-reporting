version: '3.8'

services:

  # ── Zookeeper (required by Kafka) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: qualityhub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: qualityhub-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis (caching layer for dashboard) ───────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: qualityhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (persistent metric store) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qualityhub-postgres
    environment:
      POSTGRES_USER: qualityhub
      POSTGRES_PASSWORD: qualityhub_secret
      POSTGRES_DB: qualityhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualityhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── QualityHub Ingestion API ───────────────────────────────────────────────
  ingestion-api:
    build:
      context: .
      dockerfile: src/ingestion/Dockerfile
    container_name: qualityhub-ingestion
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: test-events
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: qualityhub
      POSTGRES_PASSWORD: qualityhub_secret
      POSTGRES_DB: qualityhub
    restart: unless-stopped

  # ── QualityHub Analytics Engine ───────────────────────────────────────────
  analytics-engine:
    build:
      context: .
      dockerfile: src/analytics/Dockerfile
    container_name: qualityhub-analytics
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: test-events
      KAFKA_GROUP_ID: analytics-engine
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: qualityhub
      POSTGRES_PASSWORD: qualityhub_secret
      POSTGRES_DB: qualityhub
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped

  # ── QualityHub Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: qualityhub-dashboard
    depends_on:
      - ingestion-api
      - analytics-engine
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
      REACT_APP_WS_URL: ws://localhost:3001
    restart: unless-stopped

volumes:
  postgres_data:
